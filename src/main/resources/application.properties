spring.application.name=demo

# PostgreSQL Connection Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-frosty-violet-ampsse9l-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_xvAW9Ou8fDCF}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
# El esquema lo gobierna Flyway; Hibernate solo valida que las @Entity coincidan.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (migraciones versionadas)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
